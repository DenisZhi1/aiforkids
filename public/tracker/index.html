<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI VIBE for Teachers 2026 — Трекер прогресса</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ══ ТОЧНАЯ СПЕКА OASIS ════════════════════════════════════════════════ */
    :root {
      --bg-deep:              #0a1428;
      --bg-night:             #0f2038;
      --bg-overlay:           rgba(8, 16, 36, 0.25);

      --glass-bg:             rgba(20, 38, 66, 0.55);
      --glass-bg-hover:       rgba(28, 50, 84, 0.65);
      --glass-border:         rgba(255, 255, 255, 0.10);
      --glass-border-top:     rgba(255, 255, 255, 0.18);

      --gold:                 #f5c451;
      --gold-bright:          #ffd97a;
      --gold-deep:            #b8860b;
      --gold-glow:            rgba(245, 196, 81, 0.45);

      --text-main:            #f0f4fa;
      --text-dim:             #9fb0c8;
      --text-faint:           #5e7a9c;

      --node-empty:           rgba(255, 255, 255, 0.12);
      --node-empty-border:    rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: var(--text-main);
      background:
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url('bg-tropical-night.png') center / cover fixed no-repeat,
        var(--bg-night);
    }

    /* ── Стеклянная панель (шапка, карточки, футер) ── */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-top);
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* ── Loading ────────────────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg-deep);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 999; transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 44px; height: 44px;
      border: 3px solid rgba(245,196,81,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-brand { color: var(--gold); font-size: 24px; font-weight: 800; letter-spacing: 1px; }
    .loader-hint  { color: var(--text-dim); font-size: 12px; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      position: sticky; top: 16px; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; padding: 18px 28px;
      margin: 20px 20px 0;
      border-radius: 20px;
    }

    .logo { flex-shrink: 0; height: 64px; width: auto; filter: drop-shadow(0 0 14px rgba(245,196,81,0.35)); }

    /* Достижения */
    #ach-bar {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 16px; flex-wrap: wrap;
    }
    .achv-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; transition: transform 0.2s, filter 0.2s;
    }
    .achv-wrap:hover { transform: translateY(-4px); filter: brightness(1.2); }
    .achv {
      width: 56px; height: 56px; border-radius: 50%;
      display: grid; place-items: center;
      background: rgba(245, 196, 81, 0.08);
      border: 2px solid var(--gold);
      box-shadow: 0 0 16px var(--gold-glow), inset 0 0 12px rgba(245,196,81,0.15);
      color: var(--gold-bright); font-size: 24px;
      line-height: 1;
    }
    .achv-count {
      text-align: center; font-weight: 700; font-size: 14px;
      color: var(--text-main);
    }
    .ach-empty { color: var(--text-dim); font-size: 12px; font-style: italic; }

    /* Поиск */
    .search-wrap { flex-shrink: 0; position: relative; display: inline-block; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; pointer-events: none; opacity: .75;
    }
    #search {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 12px 18px 12px 44px;
      color: var(--text-main); width: 280px; font-size: 14px;
      font-family: inherit; outline: none; transition: all 0.2s;
    }
    #search::placeholder { color: var(--text-dim); }
    #search:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
      background-color: rgba(255,255,255,0.09);
    }


    /* ── Cards grid ─────────────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
      padding: 20px 20px 110px; /* запас под фиксированный футер */
    }
    @media (max-width: 1400px) { #grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 1100px) { #grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width:  800px) { #grid { grid-template-columns: repeat(2, 1fr); padding-bottom: 160px; } }

    /* ── Card ────────────────────────────────────────────────────────────── */
    .card {
      padding: 16px 18px;
      border-radius: 16px;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      position: relative;
      cursor: default;
    }
    .card:hover {
      transform: translateY(-3px);
      background: var(--glass-bg-hover);
      box-shadow: 0 12px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* 1 модуль — серебряная рамка */
    .card.silver {
      border: 1.5px solid rgba(192, 200, 220, 0.75) !important;
      box-shadow:
        0 0 0 1px rgba(192, 200, 220, 0.2),
        0 0 20px rgba(192, 200, 220, 0.15),
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.12);
      background: rgba(20, 28, 48, 0.55);
    }
    /* 2 модуля — золотая рамка */
    .card.gold {
      border: 1.5px solid var(--gold) !important;
      box-shadow:
        0 0 0 1px var(--gold-glow),
        0 0 24px var(--gold-glow),
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.12);
      background: rgba(40, 34, 16, 0.45);
    }

    /* Верхняя строка: аватар + имя */
    .card-head {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    }

    /* Аватар */
    .avatar-wrap { position: relative; flex-shrink: 0; }
    /* Дефолт — нейтральное кольцо */
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      object-fit: cover; display: block;
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 0 0 2px var(--bg-night);
    }
    .avatar-fb {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: var(--text-dim);
      background: rgba(15, 30, 60, 0.8);
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 0 0 2px var(--bg-night);
    }

    .card-name {
      font-size: 15px; font-weight: 700; color: var(--text-main);
      line-height: 1.2; word-break: break-word;
    }

    /* Блок модулей — две колонки рядом */
    .modules { display: flex; gap: 0; }
    .module  { flex: 1; }
    /* Золотой разделитель между Модуль 1 и Модуль 2 */
    .module:first-child {
      border-right: 1px solid rgba(245, 196, 81, 0.25);
      padding-right: 14px;
    }
    .module:last-child { padding-left: 14px; }
    .module-label {
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 8px; font-weight: 600;
    }
    .nodes { display: flex; align-items: center; gap: 6px; }

    /* Монета прогресса (img) */
    .node { width: 18px; height: 18px; flex-shrink: 0; display: block; }

    /* Сундук (img) */
    .chest { width: 26px; height: 26px; margin-left: 4px; flex-shrink: 0; display: block; opacity: 0.45; transition: opacity .2s, filter .2s; }
    .chest.unlocked {
      opacity: 1;
      cursor: pointer;
      filter: drop-shadow(0 0 8px var(--gold-glow));
      animation: chestPulse 2s ease-in-out infinite;
    }
    @keyframes chestPulse {
      0%, 100% { filter: drop-shadow(0 0 5px  var(--gold-glow)); }
      50%       { filter: drop-shadow(0 0 14px var(--gold-bright)); }
    }

    /* ── Achievement popup ──────────────────────────────────────────────── */
    #popup {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #popup.hidden { display: none; }
    .popup-box {
      background: rgba(10, 20, 44, 0.95);
      border: 1px solid var(--glass-border-top);
      border-radius: 20px; padding: 28px;
      max-width: 380px; width: 100%;
      max-height: 65vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .popup-icon  { font-size: 40px; text-align: center; margin-bottom: 8px; }
    .popup-title { color: var(--gold); font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 16px; }
    .popup-list  { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .popup-list li {
      padding: 7px 12px;
      background: rgba(255,255,255,0.04); border-radius: 8px;
      font-size: 13px; color: var(--text-main);
    }
    .popup-close {
      display: block; width: 100%; margin-top: 18px; padding: 10px;
      background: rgba(245,196,81,0.1); border: 1px solid rgba(245,196,81,0.35);
      border-radius: 10px; color: var(--gold); font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.2s;
    }
    .popup-close:hover { background: rgba(245,196,81,0.2); }

    /* ── Empty / Error ──────────────────────────────────────────────────── */
    .no-results {
      grid-column: 1 / -1; text-align: center;
      padding: 64px 20px; color: var(--text-dim); font-size: 15px;
    }
    .error-msg  {
      grid-column: 1 / -1; text-align: center; padding: 48px; color: #ff7070;
    }
    .error-msg small { display: block; margin-top: 8px; opacity: 0.6; font-size: 11px; }

    /* ── Footer — закреплён внизу, всегда виден ────────────────────────── */
    footer {
      position: fixed; left: 20px; right: 20px; bottom: 20px; z-index: 50;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 14px 28px;
      border-radius: 16px; flex-wrap: wrap; gap: 12px;
      font-size: 14px; color: var(--text-dim);
    }
    @media (max-width: 800px) {
      footer { flex-direction: column; gap: 8px; padding: 12px 16px;
               font-size: 13px; left: 10px; right: 10px; bottom: 10px; }
    }
    .legend { display: flex; align-items: center; gap: 20px; }
    .leg-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot {
      display: inline-block; width: 12px; height: 12px;
      border-radius: 50%; vertical-align: -1px;
    }
    .footer-stats { display: flex; gap: 20px; align-items: center; }
    .footer-stats span { display: flex; align-items: center; gap: 6px; }
    .footer-stats img  { height: 18px; width: auto; opacity: 0.75; }
    .footer-stats b    { color: var(--text-main); font-size: 16px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-brand">AI VIBE</div>
  <div class="loader-hint">Загрузка участников...</div>
</div>

<!-- Achievement popup -->
<div id="popup" class="hidden">
  <div class="popup-box">
    <div class="popup-icon"  id="popup-icon"></div>
    <div class="popup-title" id="popup-title"></div>
    <ul class="popup-list"   id="popup-list"></ul>
    <button class="popup-close" id="popup-close">Закрыть</button>
  </div>
</div>

<!-- Header -->
<header class="glass">
  <img src="assets/logo-deal-full.png" class="logo" alt="DE&AL — AI VIBE for Teachers">
  <div id="ach-bar"></div>
  <div class="search-wrap">
    <img src="assets/icon-search.png" class="search-icon" alt="">
    <input id="search" type="search" placeholder="Поиск по фамилии..." autocomplete="off" spellcheck="false">
  </div>
</header>


<!-- Cards -->
<main id="grid"></main>

<!-- Footer -->
<footer class="glass">
  <div class="footer-stats">
    <span><img src="assets/icon-users.png" alt=""><b id="f-total">—</b> участников</span>
    <span><img src="assets/icon-book.png"  alt=""><b>2</b> модуля</span>
    <span><img src="assets/icon-chart.png" alt=""><b id="f-progress">—</b> прогресс</span>
    <span><img src="assets/icon-refresh.png" alt="">обновлено <b id="f-updated">—</b></span>
  </div>
</footer>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }                     from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyAX6RrYU7vxVHnEKyg1_Fd0ZjW17cD1F4k",
  authDomain:        "ai-vibe2026.firebaseapp.com",
  projectId:         "ai-vibe2026",
  storageBucket:     "ai-vibe2026.firebasestorage.app",
  messagingSenderId: "587262570672",
  appId:             "1:587262570672:web:f36cb3cb981c9ea039cb75"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let allSubs   = [];
let projByVk  = {};
let achByCode = {};

const ACH_EMOJI = {
  set_sail:'⛵', first_blood:'🎯', speedrun:'⚡', deep_dive:'🤿',
  all_modules:'🏆', early_bird:'🌅', collaborator:'🤝',
  innovator:'💡', perfectionist:'💎', first_star:'⭐', crown:'👑', flame:'🔥',
};

/* ── Загрузка ── */
async function loadData() {
  const [subSnap, projSnap, achSnap] = await Promise.all([
    getDocs(collection(db, 'subscribers')),
    getDocs(collection(db, 'projects')),
    getDocs(collection(db, 'achievements')),
  ]);

  allSubs = [];
  subSnap.forEach(doc => allSubs.push(doc.data()));

  projByVk = {};
  projSnap.forEach(doc => {
    const d = doc.data();
    if (!projByVk[d.vk_id]) projByVk[d.vk_id] = {};
    projByVk[d.vk_id][`${d.module}_${d.project_no}`] = d.done;
  });

  achByCode = {};
  achSnap.forEach(doc => {
    const d = doc.data();
    if (!achByCode[d.achievement_code]) {
      achByCode[d.achievement_code] = {
        title:  d.title || d.achievement_code,
        emoji:  ACH_EMOJI[d.achievement_code] || '🏅',
        people: [],
      };
    }
    const sub  = allSubs.find(s => s.vk_id === d.vk_id);
    const name = sub ? `${sub.first_name} ${sub.last_name}` : `#${d.vk_id}`;
    achByCode[d.achievement_code].people.push(name);
  });

  /* Сортировка по фамилии, затем по имени */
  allSubs.sort((a, b) => {
    const cmp = (a.last_name || '').localeCompare(b.last_name || '', 'ru', { sensitivity: 'base' });
    if (cmp !== 0) return cmp;
    return (a.first_name || '').localeCompare(b.first_name || '', 'ru', { sensitivity: 'base' });
  });
}

/* ── Достижения ── */
function renderAchBar() {
  const bar     = document.getElementById('ach-bar');
  const entries = Object.entries(achByCode);
  if (!entries.length) {
    bar.innerHTML = '<span class="ach-empty">Достижения появятся здесь</span>';
    return;
  }
  bar.innerHTML = entries.map(([code, a]) => `
    <div class="achv-wrap" data-code="${code}" title="${a.title}">
      <div class="achv">${a.emoji}</div>
      <div class="achv-count">${a.people.length}</div>
    </div>`
  ).join('');
  bar.querySelectorAll('.achv-wrap').forEach(el =>
    el.addEventListener('click', () => showAchPopup(el.dataset.code))
  );
}

/* ── Статистика ── */
function renderStats() {
  const m1 = allSubs.filter(s => s.module_1_done).length;
  const m2 = allSubs.filter(s => s.module_2_done).length;

  let totalNodes = 0;
  allSubs.forEach(s => {
    const p = projByVk[s.vk_id] || {};
    [1,2].forEach(mod => [1,2,3,4].forEach(n => { if (p[`${mod}_${n}`]) totalNodes++; }));
  });
  const maxNodes = allSubs.length * 8;
  const pct = maxNodes > 0 ? Math.round(totalNodes / maxNodes * 100) : 0;

  const dates = allSubs.map(s => s.last_updated).filter(Boolean).sort();
  const updated = dates.length ? dates.at(-1).slice(0, 10) : '—';

  document.getElementById('f-total').textContent    = allSubs.length;
  document.getElementById('f-progress').textContent = pct + '%';
  document.getElementById('f-updated').textContent  = updated;
}

/* ── HTML карточки ── */
function nodes(mod, vkId) {
  const p = projByVk[vkId] || {};
  return [1,2,3,4].map(n => {
    const done = p[`${mod}_${n}`];
    return `<img src="assets/node-${done ? 'gold' : 'empty'}-${n}.png" class="node" alt="">`;
  }).join('');
}

function cardHTML(s) {
  const m1done  = !!s.module_1_done;
  const m2done  = !!s.module_2_done;
  const frameClass = m1done && m2done ? ' gold' : (m1done || m2done) ? ' silver' : '';

  const initials = `${(s.first_name||'')[0]||''}${(s.last_name||'')[0]||''}`.toUpperCase();

  const avatarHTML = s.photo_url
    ? `<img class="avatar"
            src="${s.photo_url}" alt="${initials}" loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="avatar-fb" style="display:none">${initials}</div>`
    : `<div class="avatar-fb">${initials}</div>`;

  const fullName = `${s.first_name||''} ${s.last_name||''}`.trim();

  const chest = (unlocked, moduleNum) =>
    `<img src="assets/chest-${unlocked ? 'unlocked' : 'locked'}.png"
          class="chest${unlocked ? ' unlocked' : ''}"
          ${unlocked ? `data-module="${moduleNum}" data-name="${fullName.replace(/"/g,'&quot;')}"` : ''}
          alt="" title="${unlocked ? 'Получить сертификат!' : ''}">`;

  return `<div class="card glass${frameClass}">
    <div class="card-head">
      <div class="avatar-wrap">${avatarHTML}</div>
      <div class="card-name">${fullName}</div>
    </div>
    <div class="modules">
      <div class="module">
        <div class="module-label">Модуль 1</div>
        <div class="nodes">
          ${nodes(1, s.vk_id)}
          ${chest(m1done, 1)}
        </div>
      </div>
      <div class="module">
        <div class="module-label">Модуль 2</div>
        <div class="nodes">
          ${nodes(2, s.vk_id)}
          ${chest(m2done, 2)}
        </div>
      </div>
    </div>
  </div>`;
}

/* ── Рендер сетки ── */
function renderCards(query = '') {
  const q    = query.trim().toLowerCase();
  const list = q
    ? allSubs.filter(s =>
        (s.last_name  || '').toLowerCase().includes(q) ||
        (s.first_name || '').toLowerCase().includes(q))
    : allSubs;

  document.getElementById('grid').innerHTML = list.length
    ? list.map(cardHTML).join('')
    : `<div class="no-results">По запросу «${query}» никого не найдено</div>`;
}

/* ── Попап достижения ── */
function showAchPopup(code) {
  const a = achByCode[code];
  if (!a) return;
  document.getElementById('popup-icon').textContent  = a.emoji;
  document.getElementById('popup-title').textContent = a.title;
  document.getElementById('popup-list').innerHTML    = a.people.length
    ? a.people.map(n => `<li>${n}</li>`).join('')
    : '<li>Пока никто не получил это достижение</li>';
  document.getElementById('popup').classList.remove('hidden');
}
document.getElementById('popup-close').addEventListener('click', () =>
  document.getElementById('popup').classList.add('hidden'));
document.getElementById('popup').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('popup').classList.add('hidden');
});

/* ── Клик по сундуку → открыть редактор сертификата ── */
document.getElementById('grid').addEventListener('click', e => {
  const chest = e.target.closest('.chest.unlocked[data-module]');
  if (!chest) return;
  const url = `cert.html?module=${chest.dataset.module}&name=${encodeURIComponent(chest.dataset.name)}`;
  window.open(url, '_blank');
});

/* ── Поиск ── */
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderCards(e.target.value), 150);
});

/* ── Init ── */
(async () => {
  try {
    await loadData();
    renderAchBar();
    renderStats();
    renderCards();
  } catch (err) {
    console.error('Ошибка загрузки:', err);
    document.getElementById('grid').innerHTML =
      `<div class="error-msg">Ошибка загрузки данных<small>${err.message}</small></div>`;
  } finally {
    const loader = document.getElementById('loading');
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 500);
  }
})();
</script>
</body>
</html>
