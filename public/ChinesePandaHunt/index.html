<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>找一找熊猫吧！- Panda Hunt</title>
    <link rel="icon" type="image/png" href="assets/panda-favicon.png" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-board" aria-label="Найди 10 панд">
        <header class="topbar">
          <div class="title-block">
            <h1>找一找熊猫吧！</h1>
            <p>Найди 10 панд</p>
          </div>

          <div class="score-card" aria-live="polite">
            <span id="score">0</span>
            <small>/ 10</small>
          </div>
        </header>

        <div class="round-bar">
          <button class="icon-button" id="newRound" type="button" aria-label="Новый раунд" title="Новый раунд">
            <span aria-hidden="true">↻</span>
          </button>
          <div class="status-pill" id="status" aria-live="polite">Раунд готов</div>
          <button class="icon-button" id="showAnswer" type="button" aria-label="Показать панд" title="Показать панд">
            <span aria-hidden="true">☯</span>
          </button>
          <div class="sound-control" aria-label="Звук">
            <button class="icon-button" id="soundToggle" type="button" aria-label="Выключить звук" title="Выключить звук">
              <span id="soundIcon" aria-hidden="true">🔊</span>
            </button>
            <input id="soundVolume" class="sound-volume" type="range" min="0" max="1" step="0.05" value="0.65" aria-label="Громкость" title="Громкость" />
          </div>
        </div>

        <div class="syllable-grid" id="grid" aria-label="Слоги пиньинь"></div>

        <div class="found-strip" id="foundStrip" aria-label="Найденные панды"></div>
      </section>
    </main>

    <div class="leaf-layer" id="leafLayer" aria-hidden="true"></div>

    <div class="win-layer is-hidden" id="winLayer" role="dialog" aria-modal="true" aria-labelledby="winTitle">
      <div class="win-effects" id="winEffects" aria-hidden="true"></div>
      <div class="win-card">
        <div class="victory-prize">
          <img class="trophy-img" src="assets/gold-trophy.png" alt="Золотой кубок" />
          <div class="giant-panda" id="winPanda" aria-hidden="true"></div>
        </div>
        <h2 class="victory-title" id="winTitle">你真棒！</h2>
        <p class="victory-subtitle">你找到了10只熊猫！</p>
        <button class="play-again" id="playAgain" type="button">Еще раунд</button>
      </div>
    </div>

    <template id="pandaTemplate">
      <img class="panda-img" src="assets/panda-mascot.png" alt="Панда" />
    </template>

    <script src="game.js"></script>
  </body>
</html>
