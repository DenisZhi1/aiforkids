  <text x="260" y="402" text-anchor="middle" fill="#ffcf4a" stroke="#0a0a16" stroke-width="4" paint-order="stroke" font-family="Trebuchet MS, Arial, sans-serif" font-size="42" font-weight="900">QUEST</text>
