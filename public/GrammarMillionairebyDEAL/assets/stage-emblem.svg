    <path d="M178 254c27-10 50-8 68 6M342 254c-27-10-50-8-68 6M178 286c27-10 50-8 68 6M342 286c-27-10-50-8-68 6" stroke="#44a9db" stroke-width="5" stroke-linecap="round"/>
