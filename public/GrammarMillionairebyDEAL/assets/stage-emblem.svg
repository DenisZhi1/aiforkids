<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Grammar Millionaire Junior emblem</title>
  <desc id="desc">A round quiz-show style emblem with a book, stars, and grammar letters.</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#eafaff"/>
      <stop offset="0.33" stop-color="#4fdfff"/>
      <stop offset="0.72" stop-color="#22256d"/>
      <stop offset="1" stop-color="#08091e"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff58a"/>
      <stop offset="0.5" stop-color="#ffca3a"/>
      <stop offset="1" stop-color="#b77718"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="260" cy="260" r="244" fill="#1f1258"/>
  <circle cx="260" cy="260" r="228" fill="url(#core)" stroke="#f6f1d0" stroke-width="10"/>
  <circle cx="260" cy="260" r="191" fill="none" stroke="url(#gold)" stroke-width="7"/>
  <circle cx="260" cy="260" r="150" fill="none" stroke="#eb4ba6" stroke-width="9"/>

