    <path d="M109 260l17 10 17-10-5 19 14 14-20 1-9 18-8-18-20-1 14-14z"/>
    <path d="M411 260l-17 10-17-10 5 19-14 14 20 1 9 18 8-18 20-1-14-14z"/>
