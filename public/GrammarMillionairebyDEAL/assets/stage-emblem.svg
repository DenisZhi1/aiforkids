  <text x="260" y="88" text-anchor="middle" fill="#ffffff" font-family="Trebuchet MS, Arial, sans-serif" font-size="34" font-weight="900">GRAMMAR</text>
  <text x="260" y="464" text-anchor="middle" fill="#ffffff" font-family="Trebuchet MS, Arial, sans-serif" font-size="34" font-weight="900">JUNIOR</text>
