    <path d="M128 128l264 264"/>
    <path d="M392 128L128 392"/>
    <path d="M260 73c55 54 81 117 81 187s-26 133-81 187c-55-54-81-117-81-187s26-133 81-187z" fill="none"/>
    <path d="M73 260c54-55 117-81 187-81s133 26 187 81c-54 55-117 81-187 81S127 315 73 260z" fill="none"/>
  </g>

  <g filter="url(#glow)">
    <path d="M156 227c44-37 79-37 104 0 25-37 60-37 104 0v118c-47-28-82-28-104 0-22-28-57-28-104 0z" fill="#f7fbff" stroke="#0b1d3f" stroke-width="8" stroke-linejoin="round"/>
