<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provoke & Run - First Person Realistic</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            cursor: none;
        }
        #ui {
            position: absolute; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%);
            color: white; 
            text-align: center; 
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            z-index: 100;
        }
        #prompt {
            font-size: 28px; 
            font-weight: bold; 
            margin-bottom: 10px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
        }
        #controls {
            font-size: 16px; 
            opacity: 0.9;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 5px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        #feedback {
            position: absolute; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(0);
            font-size: 120px; 
            opacity: 0; 
            transition: all 0.2s;
            pointer-events: none; 
            text-shadow: 3px 3px 8px rgba(0,0,0,0.8);
            z-index: 50;
        }
        .show-feedback { 
            transform: translate(-50%, -50%) scale(1) !important; 
            opacity: 1 !important;
        }
        #hand {
            position: absolute;
            bottom: -50px;
            right: 20%;
            font-size: 150px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.5));
            z-index: 40;
        }
        .show-hand {
            opacity: 1 !important;
            bottom: 50px !important;
        }
        #caught {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(139, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 48px;
            z-index: 200;
        }
        #caught button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            background: #fff;
            border: none;
            border-radius: 10px;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="prompt">🖕 PROVOKE & RUN</div>
        <div id="controls">WASD — движение | Мышь — обзор | R — показать фак | SHIFT — бег</div>
    </div>
    <div id="crosshair"></div>
    <div id="feedback">🖕💢</div>
    <div id="hand">✋</div>
    <div id="caught">
        <div>💀 ВАС ПОЙМАЛИ!</div>
        <button onclick="location.reload()">ИГРАТЬ СНОВА</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- НАСТРОЙКИ ---
        const PLAYER_SPEED = 0.08;
        const PLAYER_RUN_SPEED = 0.15;
        const NPC_WALK_SPEED = 0.03;
        const NPC_RUN_SPEED = 0.11;
        const PLAZA_SIZE = 80;
        const PLAYER_HEIGHT = 1.7;
        const PROVOKE_DISTANCE = 8;

        // --- ИНИЦИАЛИЗАЦИЯ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Голубое небо
        scene.fog = new THREE.Fog(0x87CEEB, 10, 70);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.y = PLAYER_HEIGHT;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // --- ОСВЕЩЕНИЕ (РЕАЛИСТИЧНОЕ) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(30, 50, 20);
        sunLight.castShadow = true;
        sunLight.shadow.camera.left = -50;
        sunLight.shadow.camera.right = 50;
        sunLight.shadow.camera.top = 50;
        sunLight.shadow.camera.bottom = -50;
        sunLight.shadow.mapSize.width = 4096;
        sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.bias = -0.0001;
        scene.add(sunLight);

        // Дополнительный свет для теней
        const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
        fillLight.position.set(-20, 30, -20);
        scene.add(fillLight);

        // --- ПЛОЩАДКА (С ТЕКСТУРОЙ) ---
        const groundGeometry = new THREE.PlaneGeometry(PLAZA_SIZE, PLAZA_SIZE);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x808080,
            roughness: 0.9,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка на полу для реализма
        const gridHelper = new THREE.GridHelper(PLAZA_SIZE, 40, 0x666666, 0x777777);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- ИГРОК (ПЕРВОЕ ЛИЦО) ---
        const player = {
            position: new THREE.Vector3(0, PLAYER_HEIGHT, 10),
            velocity: new THREE.Vector3(),
            direction: new THREE.Vector3(),
            rotation: new THREE.Euler(0, 0, 0, 'YXZ'),
            canProvoke: true
        };

        camera.position.copy(player.position);

        // --- NPC (РЕАЛИСТИЧНЫЕ) ---
        const npcs = [];
        const npcColors = [0x2c3e50, 0x8e44ad, 0x16a085, 0xd35400, 0xc0392b, 0x2980b9];
        
        function createNPC(x, z) {
            const npc = new THREE.Group();
            
            // Случайный цвет одежды
            const clothColor = npcColors[Math.floor(Math.random() * npcColors.length)];
            const clothMaterial = new THREE.MeshStandardMaterial({ 
                color: clothColor,
                roughness: 0.7
            });
            const skinMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffdbac,
                roughness: 0.5
            });
            const pantsMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x34495e,
                roughness: 0.8
            });

            // Тело
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.7, 0.3),
                clothMaterial
            );
            body.position.y = 1.15;
            body.castShadow = true;
            npc.add(body);

            // Голова
            const head = new THREE.Mesh(
                new THREE.BoxGeometry(0.35, 0.4, 0.35),
                skinMaterial
            );
            head.position.y = 1.75;
            head.castShadow = true;
            npc.add(head);

            // Волосы
            const hairColor = Math.random() > 0.5 ? 0x2c2416 : 0x8b6914;
            const hair = new THREE.Mesh(
                new THREE.BoxGeometry(0.37, 0.15, 0.37),
                new THREE.MeshStandardMaterial({ color: hairColor })
            );
            hair.position.y = 1.98;
            npc.add(hair);

            // Ноги
            const leftLeg = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.75, 0.2),
                pantsMaterial
            );
            leftLeg.position.set(-0.12, 0.375, 0);
            leftLeg.castShadow = true;
            npc.add(leftLeg);

            const rightLeg = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.75, 0.2),
                pantsMaterial
            );
            rightLeg.position.set(0.12, 0.375, 0);
            rightLeg.castShadow = true;
            npc.add(rightLeg);

            // Руки
            const leftArm = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, 0.6, 0.15),
                skinMaterial
            );
            leftArm.position.set(-0.35, 1.2, 0);
            leftArm.castShadow = true;
            npc.add(leftArm);

            const rightArm = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, 0.6, 0.15),
                skinMaterial
            );
            rightArm.position.set(0.35, 1.2, 0);
            rightArm.castShadow = true;
            npc.add(rightArm);

            // Позиция
            npc.position.set(x, 0, z);
            
            // Данные NPC
            npc.userData = { 
                state: 'idle',
                targetPos: new THREE.Vector3(x + (Math.random()-0.5)*15, 0, z + (Math.random()-0.5)*15),
                originalClothColor: clothColor,
                speed: NPC_WALK_SPEED,
                angerLevel: 0
            };
            
            scene.add(npc);
            return npc;
        }

        // Создаем NPC
        for(let i = 0; i < 12; i++) {
            const x = (Math.random() - 0.5) * (PLAZA_SIZE - 10);
            const z = (Math.random() - 0.5) * (PLAZA_SIZE - 10);
            if(Math.abs(x) > 3 || Math.abs(z) > 3) { // Не слишком близко к игроку
                npcs.push(createNPC(x, z));
            }
        }

        // --- УПРАВЛЕНИЕ (ПОИНТЕР ЛОК) ---
        const keys = {};
        let isPointerLocked = false;

        document.addEventListener('click', () => {
            if(!isPointerLocked) {
                document.body.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = document.pointerLockElement === document.body;
            document.getElementById('ui').style.display = isPointerLocked ? 'none' : 'block';
        });

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'KeyR') provokeNearestNPC();
        });
        document.addEventListener('keyup', e => keys[e.code] = false);

        document.addEventListener('mousemove', e => {
            if(isPointerLocked) {
                player.rotation.y -= e.movementX * 0.002;
                player.rotation.x -= e.movementY * 0.002;
                player.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, player.rotation.x));
                camera.rotation.copy(player.rotation);
            }
        });

        // --- ЛОГИКА ---
        const feedbackEl = document.getElementById('feedback');
        const handEl = document.getElementById('hand');

        function provokeNearestNPC() {
            if(!player.canProvoke) return;

            let nearest = null;
            let minDist = Infinity;
            
            npcs.forEach(npc => {
                const dist = camera.position.distanceTo(npc.position);
                if(dist < minDist) {
                    minDist = dist;
                    nearest = npc;
                }
            });

            if(nearest && minDist < PROVOKE_DISTANCE) {
                // Показываем руку
                handEl.textContent = '🖕';
                handEl.classList.add('show-hand');
                setTimeout(() => handEl.classList.remove('show-hand'), 800);

                // Показываем фидбек
                feedbackEl.classList.add('show-feedback');
                setTimeout(() => feedbackEl.classList.remove('show-feedback'), 1000);

                // Злим NPC
                nearest.userData.state = 'chase';
                nearest.userData.angerLevel = 100;
                nearest.userData.speed = NPC_RUN_SPEED;
                
                // Меняем цвет на красный (злой)
                nearest.children[0].material.color.setHex(0x8b0000);
                
                // Все nearby NPC тоже злятся
                npcs.forEach(otherNPC => {
                    if(otherNPC !== nearest && camera.position.distanceTo(otherNPC.position) < 15) {
                        otherNPC.userData.state = 'chase';
                        otherNPC.userData.angerLevel = 80;
                        otherNPC.userData.speed = NPC_RUN_SPEED;
                        otherNPC.children[0].material.color.setHex(0xa52a2a);
                    }
                });

                player.canProvoke = false;
                setTimeout(() => player.canProvoke = true, 2000);
            }
        }

        function updatePlayer() {
            const speed = keys['ShiftLeft'] || keys['ShiftRight'] ? PLAYER_RUN_SPEED : PLAYER_SPEED;
            
            const forward = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, player.rotation.y, 0));
            const right = new THREE.Vector3(1, 0, 0).applyEuler(new THREE.Euler(0, player.rotation.y, 0));
            
            const move = new THREE.Vector3(0, 0, 0);
            
            if(keys['KeyW'] || keys['ArrowUp']) move.add(forward);
            if(keys['KeyS'] || keys['ArrowDown']) move.sub(forward);
            if(keys['KeyA'] || keys['ArrowLeft']) move.sub(right);
            if(keys['KeyD'] || keys['ArrowRight']) move.add(right);

            if(move.length() > 0) {
                move.normalize().multiplyScalar(speed);
                
                const limit = PLAZA_SIZE/2 - 1;
                player.position.x += move.x;
                player.position.z += move.z;
                
                player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
                player.position.z = Math.max(-limit, Math.min(limit, player.position.z));
                
                camera.position.x = player.position.x;
                camera.position.z = player.position.z;
            }
        }

        function updateNPCs() {
            let caught = false;
            
            npcs.forEach(npc => {
                const data = npc.userData;
                const distToPlayer = npc.position.distanceTo(camera.position);
                
                if(data.state === 'idle') {
                    // Случайное блуждание
                    const dir = data.targetPos.clone().sub(npc.position);
                    dir.y = 0;
                    
                    if(dir.length() < 1) {
                        data.targetPos.set(
                            (Math.random()-0.5)*(PLAZA_SIZE-10),
                            0,
                            (Math.random()-0.5)*(PLAZA_SIZE-10)
                        );
                    }
                    
                    dir.normalize().multiplyScalar(data.speed * 0.5);
                    npc.position.add(dir);
                    npc.lookAt(data.targetPos.x, npc.position.y, data.targetPos.z);
                    
                    // Анимация ходьбы
                    const time = Date.now() * 0.005;
                    npc.children[3].rotation.x = Math.sin(time) * 0.3;
                    npc.children[4].rotation.x = Math.sin(time + Math.PI) * 0.3;
                    
                } else if(data.state === 'chase') {
                    // Преследование
                    const dir = camera.position.clone().sub(npc.position);
                    dir.y = 0;
                    dir.normalize();
                    
                    if(distToPlayer > 1.5) {
                        npc.position.add(dir.multiplyScalar(data.speed));
                        npc.lookAt(camera.position.x, npc.position.y, camera.position.z);
                        
                        // Анимация бега
                        const time = Date.now() * 0.01;
                        npc.children[3].rotation.x = Math.sin(time) * 0.6;
                        npc.children[4].rotation.x = Math.sin(time + Math.PI) * 0.6;
                        npc.children[5].rotation.x = Math.sin(time + Math.PI) * 0.4;
                        npc.children[6].rotation.x = Math.sin(time) * 0.4;
                    } else {
                        caught = true;
                    }
                    
                    // Постепенное успокоение
                    data.angerLevel -= 0.1;
                    if(data.angerLevel <= 0) {
                        data.state = 'idle';
                        data.speed = NPC_WALK_SPEED;
                        npc.children[0].material.color.setHex(data.originalClothColor);
                    }
                }
            });
            
            if(caught) {
                document.getElementById('caught').style.display = 'flex';
                document.exitPointerLock();
            }
        }

        // --- ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            updatePlayer();
            updateNPCs();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
